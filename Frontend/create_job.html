<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TalentBridge — Post a Job</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Syne:wght@700;800&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0f1e; --surface: #111827; --surface2: #1a2436; --border: #1e2d45;
    --accent: #3b82f6; --accent-glow: rgba(59,130,246,0.15); --green: #10b981;
    --text: #e2e8f0; --muted: #64748b; --muted2: #94a3b8;
    --heading-font: 'Syne', sans-serif; --body-font: 'Inter', sans-serif;
  }
  body { background: var(--bg); font-family: var(--body-font); color: var(--text); min-height: 100vh; }
  .nav { background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 0 32px; display: flex; align-items: center; justify-content: space-between; height: 60px; }
  .nav-brand { font-family: var(--heading-font); font-size: 20px; font-weight: 800; }
  .nav-brand span { color: var(--accent); }
  .nav-right { display: flex; align-items: center; gap: 12px; }
  .btn-back { background: transparent; border: 1px solid var(--border); color: var(--muted);
    padding: 7px 14px; border-radius: 7px; text-decoration: none; font-size: 13px; transition: all 0.2s; }
  .btn-back:hover { border-color: var(--accent); color: var(--accent); }
  .page { max-width: 780px; margin: 0 auto; padding: 36px 24px; }
  .page-title { font-family: var(--heading-font); font-size: 26px; font-weight: 800; margin-bottom: 6px; }
  .page-sub { font-size: 14px; color: var(--muted); margin-bottom: 32px; }
  .form-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 32px; }
  .form-section { margin-bottom: 28px; }
  .form-section-title { font-size: 12px; font-weight: 700; color: var(--accent); text-transform: uppercase;
    letter-spacing: 1px; margin-bottom: 18px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .form-group { margin-bottom: 18px; }
  .form-group label { display: block; font-size: 12px; font-weight: 600; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 7px; }
  .form-group input, .form-group select, .form-group textarea {
    width: 100%; background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); padding: 11px 14px; border-radius: 8px; font-family: var(--body-font);
    font-size: 14px; outline: none; transition: border-color 0.2s, box-shadow 0.2s; resize: vertical; }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
    border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
  .form-group select option { background: var(--surface2); }
  .hint { font-size: 11px; color: var(--muted); margin-top: 5px; }
  .form-actions { display: flex; gap: 12px; justify-content: flex-end; padding-top: 8px; }
  .btn-primary { background: var(--accent); color: #fff; border: none; padding: 12px 28px;
    border-radius: 8px; font-family: var(--body-font); font-size: 14px; font-weight: 600;
    cursor: pointer; transition: opacity 0.2s, transform 0.15s; }
  .btn-primary:hover { opacity: 0.88; transform: translateY(-1px); }
  .btn-cancel { background: var(--surface2); color: var(--muted); border: 1px solid var(--border);
    padding: 12px 22px; border-radius: 8px; font-family: var(--body-font); font-size: 14px;
    cursor: pointer; text-decoration: none; transition: all 0.2s; }
  .btn-cancel:hover { border-color: var(--muted); color: var(--text); }
  @media (max-width: 600px) { .form-row { grid-template-columns: 1fr; } .page { padding: 24px 16px; } }
</style>
</head>
<body>
<nav class="nav">
  <div class="nav-brand">Talent<span>Bridge</span></div>
  <div class="nav-right">
    <a href="/" class="btn-back">← Dashboard</a>
  </div>
</nav>

<div class="page">
  <div class="page-title">Post a New Job</div>
  <div class="page-sub">Fill out the details below. Be specific — better descriptions attract better candidates.</div>

  <div class="form-card">
    <form method="post" action="/jobs/create">

      <div class="form-section">
        <div class="form-section-title">Basic Info</div>
        <div class="form-row">
          <div class="form-group">
            <label>Job Title *</label>
            <input type="text" name="title" placeholder="e.g. SOC Analyst L1" required>
          </div>
          <div class="form-group">
            <label>Company Name *</label>
            <input type="text" name="company" placeholder="e.g. Fiserv India" required>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Location *</label>
            <input type="text" name="location" placeholder="e.g. Pune, Maharashtra" required>
          </div>
          <div class="form-group">
            <label>Salary Range *</label>
            <input type="text" name="salary_range" placeholder="e.g. ₹6–10 LPA" required>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Job Type *</label>
            <select name="job_type" required>
              <option value="">Select type…</option>
              <option>Full-time</option>
              <option>Part-time</option>
              <option>Remote</option>
              <option>Hybrid</option>
              <option>Contract</option>
              <option>Internship</option>
            </select>
          </div>
          <div class="form-group">
            <label>Experience Level *</label>
            <select name="experience_level" required>
              <option value="">Select level…</option>
              <option>Entry Level (0–2 yrs)</option>
              <option>Mid Level (2–5 yrs)</option>
              <option>Senior Level (5+ yrs)</option>
              <option>Fresher / Intern</option>
            </select>
          </div>
        </div>
      </div>

      <div class="form-section">
        <div class="form-section-title">Job Description</div>
        <div class="form-group">
          <label>Full Description *</label>
          <textarea name="description" rows="6" placeholder="Describe the role, responsibilities, and what the ideal candidate looks like…" required></textarea>
        </div>
        <div class="form-group">
          <label>Required Skills *</label>
          <input type="text" name="required_skills" placeholder="Python, SIEM, Splunk, Network Security, MITRE ATT&CK" required>
          <div class="hint">Comma-separated — these are used for skill matching with candidates.</div>
        </div>
      </div>

      <div class="form-actions">
        <a href="/" class="btn-cancel">Cancel</a>
        <button type="submit" class="btn-primary">Publish Job →</button>
      </div>
    </form>
  </div>
</div>
</body>
</html>
